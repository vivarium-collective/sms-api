      - name: process_id
        in: path
        required: true
        schema:
          type: string
          title: Process Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /compose/v1/process/{process}/update/{process_id}:
