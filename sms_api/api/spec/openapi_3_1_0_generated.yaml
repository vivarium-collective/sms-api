          type: string
          title: Source Ref
          description: Git branch/tag/commit to target
          default: main
        tool_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Tool Name
          description: 'Override the derived tool name (default: inferred from repo
            name)'
