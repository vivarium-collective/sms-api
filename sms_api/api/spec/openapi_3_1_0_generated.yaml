                $ref: '#/components/schemas/HTTPValidationError'
  /compose/v1/process/{process}/outputs/{process_id}:
    get:
      summary: Processrouter.Get Outputs
      operationId: ProcessRouter_get_outputs_compose_v1_process__process__outputs__process_id__get
      parameters:
