openapi: 3.1.0
info:
  title: sms-api
  version: 0.4.14
paths:
  /api/v1/simulations:
    post:
      tags:
      - Simulations
      summary: '[New] Launches a vEcoli simulation workflow with simple parameters'
      description: 'Run a vEcoli simulation workflow with simplified parameters.


        This endpoint reads the workflow configuration from the vEcoli repo on the
        HPC

        system and allows overriding specific parameters via query params.'
      operationId: run-ecoli-simulation-new
      parameters:
      - name: simulator_id
        in: query
        required: true
        schema:
          type: integer
          description: '`database_id` of the simulator object returned by /core/v1/simulator/upload'
          title: Simulator Id
        description: '`database_id` of the simulator object returned by /core/v1/simulator/upload'
      - name: experiment_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Unique experiment identifier
          title: Experiment Id
        description: Unique experiment identifier
      - name: simulation_config_filename
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SimulationConfigPrivate'
          description: " Config filename in vEcoli/configs/ on HPC,\n            chosen\
            \ according to the given deployment's linked\n            vEcoli repo.\
            \ See user docs for more details\n        "
          default: api_simulation_default.json
        description: " Config filename in vEcoli/configs/ on HPC,\n            chosen\
          \ according to the given deployment's linked\n            vEcoli repo. See\
          \ user docs for more details\n        "
      - name: num_generations
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Number of generations to simulate
          title: Num Generations
        description: Number of generations to simulate
      - name: num_seeds
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Number of initial seeds (lineages)
          title: Num Seeds
        description: Number of initial seeds (lineages)
      - name: description
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Description of the simulation
          title: Description
        description: Description of the simulation
      - name: run_parca
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: If true, run the simulation parameter calculator prior to running
            simulation (re-parameterizes simulation workflow).
          title: Run Parca
        description: If true, run the simulation parameter calculator prior to running
          simulation (re-parameterizes simulation workflow).
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Simulations
      summary: List all simulation specs uploaded to the database
      operationId: list-ecoli-simulations
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Simulation'
                title: Response List-Ecoli-Simulations
  /api/v1/simulations/{id}:
    get:
      tags:
      - Simulations
      summary: Get Simulation
      operationId: get-ecoli-simulation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the simulation
          title: Id
        description: Database ID of the simulation
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/Simulation'
                - type: 'null'
                title: Response Get-Ecoli-Simulation
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/status:
    get:
      tags:
      - Simulations
      summary: Get the simulation status record by its ID
      operationId: get-ecoli-simulation-status
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/cancel:
    delete:
      tags:
      - Simulations
      summary: Cancel a running simulation
      description: Cancel a running simulation by killing its backend job.
      operationId: cancel-ecoli-simulation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the simulation
          title: Id
        description: Database ID of the simulation
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/log:
    get:
      tags:
      - Simulations
      summary: Get the structured output of a given simulation workflow log.
      operationId: get-ecoli-simulation-log
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/data:
    post:
      tags:
      - Simulations
      summary: Get simulation omics data as a downloadable tar.gz archive
      description: "Get simulation outputs as a tar.gz archive.\n\nChoose response_type\
        \ based on your use case:\n- **file**: Creates the archive and returns it\
        \ as a downloadable file.\n  Best for browser downloads and Swagger UI - shows\
        \ a \"Download\" button.\n- **streaming**: Streams the archive in chunks as\
        \ it's created.\n  Better for very large files or when you want to start processing\
        \ before download completes."
      operationId: get-ecoli-simulation-data
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the simulation.
          title: Id
        description: Database ID of the simulation.
      - name: response_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SimulationAnalysisDataResponseType'
          description: 'Response type: ''file'' for direct download (recommended for
            browsers/Swagger UI), ''streaming'' for chunked streaming response (better
            for large files or programmatic access)'
          default: file
        description: 'Response type: ''file'' for direct download (recommended for
          browsers/Swagger UI), ''streaming'' for chunked streaming response (better
          for large files or programmatic access)'
      responses:
        '200':
          description: A tar.gz archive containing simulation output files
          content:
            application/json:
              schema: {}
            application/gzip: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses:
    post:
      tags:
      - Analyses
      summary: Run an analysis
      operationId: run-ecoli-simulation-analysis
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperimentAnalysisRequest'
              default:
                experiment_id: sim3-baseline-ca00
                multiseed:
                - name: ptools_rna
                  n_tp: 8
                  variant: 0
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  anyOf:
                  - $ref: '#/components/schemas/TsvOutputFile'
                  - $ref: '#/components/schemas/OutputFileMetadata'
                type: array
                title: Response Run-Ecoli-Simulation-Analysis
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}:
    get:
      tags:
      - Analyses
      summary: Retrieve an experiment analysis spec from the database
      operationId: get-analysis
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentAnalysisDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}/status:
    get:
      tags:
      - Analyses
      summary: Get the status of an existing experiment analysis run
      operationId: get-analysis-status
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the analysis
          title: Id
        description: Database ID of the analysis
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}/log:
    get:
      tags:
      - Analyses
      summary: Get the log of an existing experiment analysis run
      operationId: get-analysis-log
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the analysis
          title: Id
        description: Database ID of the analysis
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Get-Analysis-Log
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}/plots:
    get:
      tags:
      - Analyses
      summary: Get an array of HTML files representing all plot outputs of a given
        analysis.
      operationId: get-analysis-plots
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the analysis
          title: Id
        description: Database ID of the analysis
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OutputFile'
                title: Response Get-Analysis-Plots
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulator/latest:
    get:
      tags:
      - EcoliSim
      summary: Get the latest simulator version
      operationId: get-latest-simulator
      parameters:
      - name: git_repo_url
        in: query
        required: false
        schema:
          type: string
          default: https://github.com/CovertLabEcoli/vEcoli-private
          title: Git Repo Url
      - name: git_branch
        in: query
        required: false
        schema:
          type: string
          default: api-analysis-patch
          title: Git Branch
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulator'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulator/versions:
    get:
      tags:
      - EcoliSim
      summary: get the list of available simulator versions
      operationId: get-simulator-versions
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisteredSimulators'
  /core/v1/simulator/status:
    get:
      tags:
      - EcoliSim
      summary: Get simulator container build status by its ID
      operationId: get-simulator-status
      parameters:
      - name: simulator_id
        in: query
        required: true
        schema:
          type: integer
          title: Simulator Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HpcRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulator/upload:
    post:
      tags:
      - EcoliSim
      summary: Upload a new simulator (vEcoli) version.
      operationId: insert-simulator-version
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Simulator'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulatorVersion'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulation/parca:
    post:
      tags:
      - EcoliSim
      summary: Run a parameter calculation
      operationId: run-parca
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcaDatasetRequest'
              default:
                simulator_version:
                  git_commit_hash: 2f3ead
                  git_repo_url: https://github.com/CovertLabEcoli/vEcoli-private
                  git_branch: api-analysis-patch
                  database_id: 25
                  created_at: '2026-03-31T23:33:56.589291'
                parca_config:
                  outdir: /projects/SMS/sms_api/jim/sims
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcaDataset'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulation/parca/versions:
    get:
      tags:
      - EcoliSim
      summary: Get list of parca calculations
      operationId: get-parca-versions
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ParcaDataset'
                type: array
                title: Response Get-Parca-Versions
  /core/v1/simulation/parca/status:
    get:
      tags:
      - EcoliSim
      summary: Get parca calculation status by its ID
      operationId: get-parca-status
      parameters:
      - name: parca_id
        in: query
        required: true
        schema:
          type: integer
          title: Parca Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HpcRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: Redirect Old Path
      operationId: redirect_old_path__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /home:
    get:
      tags:
      - SMS API
      summary: Home
      operationId: home_home_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      tags:
      - SMS API
      summary: Check Health
      operationId: check_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Check Health Health Get
  /version:
    get:
      tags:
      - SMS API
      summary: Get Version
      operationId: get_version_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Get Version Version Get
components:
  schemas:
    AnalysisConfig:
      properties:
        analysis_options:
          $ref: '#/components/schemas/AnalysisConfigOptions'
      additionalProperties: true
      type: object
      required:
      - analysis_options
      title: AnalysisConfig
    AnalysisConfigOptions:
      properties:
        experiment_id:
          items:
            type: string
          type: array
          title: Experiment Id
      additionalProperties: true
      type: object
      required:
      - experiment_id
      title: AnalysisConfigOptions
    AnalysisModuleConfig:
      properties:
        name:
          type: string
          title: Name
        files:
          anyOf:
          - items:
              $ref: '#/components/schemas/OutputFileMetadata'
            type: array
          - type: 'null'
          title: Files
      additionalProperties: true
      type: object
      required:
      - name
      title: AnalysisModuleConfig
    AnalysisOptions:
      properties:
        cpus:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cpus
      additionalProperties: true
      type: object
      title: AnalysisOptions
    AnalysisRun:
      properties:
        id:
          type: integer
          title: Id
        status:
          $ref: '#/components/schemas/JobStatus'
        job_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Job Id
        error_log:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Log
      type: object
      required:
      - id
      - status
      title: AnalysisRun
    ExperimentAnalysisDTO:
      properties:
        database_id:
          type: integer
          title: Database Id
        name:
          type: string
          title: Name
        config:
          $ref: '#/components/schemas/AnalysisConfig'
        last_updated:
          type: string
          title: Last Updated
        job_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Job Name
        job_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Job Id
      type: object
      required:
      - database_id
      - name
      - config
      - last_updated
      title: ExperimentAnalysisDTO
      description: "DTO returned by /analyses .. endpoints\n\nAttributes:\n    database_id:\
        \ (``int``) unique identifier of analysis record.\n    name: (``str``) analysis\
        \ name.\n    config: (``AnalysisConfig``) data model whose serialized format\n\
        \        represents a valid analysis config ingestible by vEcoli.\n    job_name:\
        \ (``str | None``) SLURM analysis job name referenced by sbatch directives.\n\
        \    job_id: (``int | None``) SLURM analysis job id generated by the ``sbatch``\
        \ evocation.\n        Defaults to ``None`` (such that this object can be partially\
        \ instantiated)."
    ExperimentAnalysisRequest:
      properties:
        experiment_id:
          type: string
          title: Experiment Id
        single:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Single
        multidaughter:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multidaughter
        multigeneration:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multigeneration
        multiseed:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multiseed
        multivariant:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multivariant
        multiexperiment:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multiexperiment
      type: object
      required:
      - experiment_id
      title: ExperimentAnalysisRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HpcRun:
      properties:
        database_id:
          type: integer
          title: Database Id
        correlation_id:
          type: string
          title: Correlation Id
        job_type:
          $ref: '#/components/schemas/JobType'
        ref_id:
          type: integer
          title: Ref Id
        status:
          anyOf:
          - $ref: '#/components/schemas/JobStatus'
          - type: 'null'
        start_time:
          anyOf:
          - type: string
          - type: 'null'
          title: Start Time
        end_time:
          anyOf:
          - type: string
          - type: 'null'
          title: End Time
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        job_id_ext:
          type: string
          title: Job Id Ext
          readOnly: true
        job_backend:
          type: string
          title: Job Backend
          readOnly: true
      additionalProperties: true
      type: object
      required:
      - database_id
      - correlation_id
      - job_type
      - ref_id
      - job_id_ext
      - job_backend
      title: HpcRun
    JobStatus:
      type: string
      enum:
      - unknown
      - waiting
      - pending
      - queued
      - running
      - completed
      - cancelled
      - failed
      title: JobStatus
      description: Shared job status enum for simulations, analyses, and other HPC
        jobs.
    JobType:
      type: string
      enum:
      - analysis
      - simulation
      - parca
      - build_image
      title: JobType
    OutputFile:
      properties:
        name:
          type: string
          title: Name
        content:
          type: string
          title: Content
      type: object
      required:
      - name
      - content
      title: OutputFile
    OutputFileMetadata:
      properties:
        filename:
          type: string
          title: Filename
        variant:
          type: integer
          title: Variant
          default: 0
        lineage_seed:
          anyOf:
          - type: integer
          - type: 'null'
          title: Lineage Seed
        generation:
          anyOf:
          - type: integer
          - type: 'null'
          title: Generation
        agent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Id
        content:
          anyOf:
          - type: string
          - type: 'null'
          title: Content
      type: object
      required:
      - filename
      title: OutputFileMetadata
    ParcaDataset:
      properties:
        database_id:
          type: integer
          title: Database Id
        parca_dataset_request:
          $ref: '#/components/schemas/ParcaDatasetRequest'
        remote_archive_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Remote Archive Path
      additionalProperties: true
      type: object
      required:
      - database_id
      - parca_dataset_request
      title: ParcaDataset
    ParcaDatasetRequest:
      properties:
        simulator_version:
          $ref: '#/components/schemas/SimulatorVersion'
        parca_config:
          $ref: '#/components/schemas/ParcaOptions'
          default:
            outdir: /projects/SMS/sms_api/jim/sims
      additionalProperties: true
      type: object
      required:
      - simulator_version
      title: ParcaDatasetRequest
    ParcaOptions:
      properties:
        outdir:
          type: string
          title: Outdir
          default: /projects/SMS/sms_api/jim/sims
      additionalProperties: true
      type: object
      title: ParcaOptions
    PtoolsAnalysisConfig:
      properties:
        name:
          type: string
          title: Name
          default: ptools_rxns
        n_tp:
          type: integer
          title: N Tp
          default: 8
        variant:
          type: integer
          title: Variant
          default: 0
        generation:
          anyOf:
          - type: integer
          - type: 'null'
          title: Generation
        lineage_seed:
          anyOf:
          - type: integer
          - type: 'null'
          title: Lineage Seed
        agent_id:
          anyOf:
