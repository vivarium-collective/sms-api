components:
  schemas:
    AnalysisConfig:
      properties:
        analysis_options:
          $ref: '#/components/schemas/AnalysisConfigOptions'
      additionalProperties: true
      type: object
      required:
      - analysis_options
      title: AnalysisConfig
    AnalysisConfigOptions:
      properties:
        experiment_id:
          items:
            type: string
          type: array
          title: Experiment Id
      additionalProperties: true
      type: object
      required:
      - experiment_id
      title: AnalysisConfigOptions
    AnalysisModuleConfig:
      properties:
        name:
          type: string
          title: Name
        files:
          anyOf:
          - items:
              $ref: '#/components/schemas/OutputFileMetadata'
            type: array
          - type: 'null'
          title: Files
      additionalProperties: true
      type: object
      required:
      - name
      title: AnalysisModuleConfig
    AnalysisOptions:
      properties:
        cpus:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cpus
      additionalProperties: true
      type: object
      title: AnalysisOptions
    AnalysisRun:
      properties:
        id:
          type: integer
          title: Id
        status:
          $ref: '#/components/schemas/JobStatus'
        job_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Job Id
        error_log:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Log
      type: object
      required:
      - id
      - status
      title: AnalysisRun
    BiGraphComputeType:
      type: string
      enum:
      - process
      - step
      title: BiGraphComputeType
    BiGraphProcess:
      properties:
        module:
          type: string
          title: Module
        name:
          type: string
          title: Name
        compute_type:
          $ref: '#/components/schemas/BiGraphComputeType'
        inputs:
          type: string
          title: Inputs
        outputs:
          type: string
          title: Outputs
        database_id:
          type: integer
          title: Database Id
      type: object
      required:
      - module
      - name
      - compute_type
      - inputs
      - outputs
      - database_id
      title: BiGraphProcess
    BiGraphStep:
      properties:
        module:
          type: string
          title: Module
        name:
          type: string
          title: Name
        compute_type:
          $ref: '#/components/schemas/BiGraphComputeType'
        inputs:
          type: string
          title: Inputs
        outputs:
          type: string
          title: Outputs
        database_id:
          type: integer
          title: Database Id
      type: object
      required:
      - module
      - name
      - compute_type
      - inputs
      - outputs
      - database_id
      title: BiGraphStep
    BiomodelInfo:
      properties:
        biomodel_id:
          type: string
          title: Biomodel Id
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - biomodel_id
      - metadata
      title: BiomodelInfo
    BiomodelSimulator:
      type: string
      enum:
      - copasi
      - tellurium
      title: BiomodelSimulator
    BiomodelsAuditResult:
      properties:
        experiment:
          $ref: '#/components/schemas/ComposeSimulationExperiment'
        simulators_used:
          items:
            $ref: '#/components/schemas/BiomodelSimulator'
          type: array
          title: Simulators Used
      type: object
      required:
      - experiment
      - simulators_used
      title: BiomodelsAuditResult
    BiomodelsRegressionRequest:
      properties:
        n_models:
          type: integer
          maximum: 1000.0
          minimum: 1.0
          title: N Models
          description: Number of models to run. Ignored if model_ids set.
          default: 10
        model_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Model Ids
          description: Specific BioModel IDs to run. Overrides n_models.
        simulators:
          items:
            $ref: '#/components/schemas/BiomodelSimulator'
          type: array
          title: Simulators
          description: Simulators to wire into each model's PB document.
      type: object
      title: BiomodelsRegressionRequest
    BiomodelsRegressionResult:
      properties:
        submitted:
          items:
            $ref: '#/components/schemas/ComposeSimulationExperiment'
          type: array
          title: Submitted
        failed:
          items:
            type: string
          type: array
          title: Failed
          description: BioModel IDs that failed to submit.
        total_requested:
          type: integer
          title: Total Requested
      type: object
      required:
      - submitted
      - total_requested
      title: BiomodelsRegressionResult
    BiomodelsRunRequest:
      properties:
        model_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Model Ids
          description: Specific BioModel IDs to run. Mutually exclusive with n_models.
        n_models:
          anyOf:
          - type: integer
            maximum: 50.0
            minimum: 1.0
          - type: 'null'
          title: N Models
          description: Run the first N BioModels. Ignored if model_ids is set.
        simulator:
          $ref: '#/components/schemas/BiomodelSimulator'
          description: Simulator to use for each model.
          default: copasi
      type: object
      title: BiomodelsRunRequest
    BiomodelsRunResult:
      properties:
        submitted:
          items:
            $ref: '#/components/schemas/ComposeSimulationExperiment'
          type: array
          title: Submitted
        failed:
          items:
            type: string
          type: array
          title: Failed
          description: BioModel IDs that failed to submit.
      type: object
      required:
      - submitted
      title: BiomodelsRunResult
    Body_compose-run-copasi:
      properties:
        sbml:
          type: string
          contentMediaType: application/octet-stream
          title: Sbml
      type: object
      required:
      - sbml
      title: Body_compose-run-copasi
    Body_compose-run-simulation:
      properties:
        uploaded_file:
          type: string
          contentMediaType: application/octet-stream
          title: Uploaded File
      type: object
      required:
      - uploaded_file
      title: Body_compose-run-simulation
    Body_compose-run-tellurium:
      properties:
        sbml:
          type: string
          contentMediaType: application/octet-stream
          title: Sbml
      type: object
      required:
      - sbml
      title: Body_compose-run-tellurium
    ComposeHpcRun:
      properties:
        database_id:
          type: integer
          title: Database Id
        slurmjobid:
          type: integer
          title: Slurmjobid
        correlation_id:
          type: string
          title: Correlation Id
        job_type:
          $ref: '#/components/schemas/ComposeJobType'
        sim_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sim Id
        simulator_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Simulator Id
        status:
          anyOf:
          - $ref: '#/components/schemas/ComposeJobStatus'
          - type: 'null'
        start_time:
          anyOf:
          - type: string
          - type: 'null'
          title: Start Time
        end_time:
          anyOf:
          - type: string
          - type: 'null'
          title: End Time
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
