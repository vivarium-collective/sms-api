      summary: "Run a BioModels regression suite \u2014 submit N models, collect results"
      operationId: compose-biomodels-regression
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BiomodelsRegressionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BiomodelsRegressionResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /compose/v1/wrappers:
    post:
      tags:
      - Compose Wrappers
      summary: Generate a pbg-<tool> wrapper for an arbitrary simulator repo
      description: "Submit a simulator's GitHub URL to generate a process-bigraph\
        \ wrapper package.\n\nReturns immediately with a ``wrapper_id``. The wrapper\
        \ is generated\nasynchronously \u2014 poll ``GET /compose/v1/wrappers/{wrapper_id}/status``\n\
        until ``status == 'available'``.\n\nOnce available the new processes appear\
        \ in ``GET /compose/v1/processes``\nand can be referenced in ``POST /compose/v1/simulation/run``\
        \ documents."
      operationId: compose-create-wrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PbgWrapperCreateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PbgWrapperRecord'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Compose Wrappers
      summary: List all generated pbg-* wrappers
      operationId: compose-list-wrappers
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/WrapperStatus'
          - type: 'null'
          title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PbgWrapperRecord'
                title: Response Compose-List-Wrappers
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /compose/v1/wrappers/{wrapper_id}/status:
    get:
      tags:
      - Compose Wrappers
      summary: Poll the status of a pbg-wrapper generation job
      operationId: compose-get-wrapper-status
      parameters:
      - name: wrapper_id
        in: path
        required: true
        schema:
          type: integer
          title: Wrapper Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PbgWrapperRecord'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: Redirect Old Path
      operationId: redirect_old_path__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /home:
    get:
      tags:
      - SMS API
      summary: Home
      operationId: home_home_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      tags:
      - SMS API
      summary: Check Health
      operationId: check_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Check Health Health Get
  /version:
    get:
      tags:
      - SMS API
      summary: Get Version
      operationId: get_version_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Get Version Version Get
