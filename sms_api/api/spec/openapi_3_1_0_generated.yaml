openapi: 3.1.0
info:
  title: sms-api
  version: 0.9.5
paths:
  /api/v1/simulations/discovery:
    get:
      tags:
      - Simulations
      summary: Discover available config files and analysis modules for a simulator
      description: Enumerate config filenames and analysis modules available in the
        simulator's repo.
      operationId: discover-simulator-repo-contents
      parameters:
      - name: simulator_id
        in: query
        required: true
        schema:
          type: integer
          description: database_id of the simulator to introspect
          title: Simulator Id
        description: database_id of the simulator to introspect
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoDiscovery'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations:
    post:
      tags:
      - Simulations
      summary: '[New] Launches a vEcoli simulation workflow with simple parameters'
      description: 'Run a vEcoli simulation workflow with simplified parameters.


        This endpoint reads the workflow configuration from the vEcoli repo on the
        HPC

        system and allows overriding specific parameters via query params.'
      operationId: run-ecoli-simulation-new
      parameters:
      - name: simulator_id
        in: query
        required: true
        schema:
          type: integer
          description: '`database_id` of the simulator object returned by /core/v1/simulator/upload'
          title: Simulator Id
        description: '`database_id` of the simulator object returned by /core/v1/simulator/upload'
      - name: experiment_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Unique experiment identifier
          title: Experiment Id
        description: Unique experiment identifier
      - name: simulation_config_filename
        in: query
        required: false
        schema:
          type: string
          description: Config filename in vEcoli/configs/. Use GET /simulations/discovery
            to list available files.
          default: api_simulation_default.json
          title: Simulation Config Filename
        description: Config filename in vEcoli/configs/. Use GET /simulations/discovery
          to list available files.
      - name: num_generations
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Number of generations to simulate
          title: Num Generations
        description: Number of generations to simulate
      - name: num_seeds
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Number of initial seeds (lineages)
          title: Num Seeds
        description: Number of initial seeds (lineages)
      - name: description
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Description of the simulation
          title: Description
        description: Description of the simulation
      - name: run_parca
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: If true, run the simulation parameter calculator prior to running
            simulation (re-parameterizes simulation workflow).
          title: Run Parca
        description: If true, run the simulation parameter calculator prior to running
          simulation (re-parameterizes simulation workflow).
      - name: observables
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: Dot-separated vEcoli output paths to observe. E.g. ['bulk',
            'listeners.mass.cell_mass']. Maps to engine_process_reports in the vEcoli
            config. If omitted, all outputs are emitted.
          title: Observables
        description: Dot-separated vEcoli output paths to observe. E.g. ['bulk', 'listeners.mass.cell_mass'].
          Maps to engine_process_reports in the vEcoli config. If omitted, all outputs
          are emitted.
      - name: ecoli_sources_uri
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: S3 URI for the ECOLI_SOURCES env var on the simulation container.
            Set automatically when ecoli_sources_repo_url is provided, or manually
            via the CLI's --sources flag.
          title: Ecoli Sources Uri
        description: S3 URI for the ECOLI_SOURCES env var on the simulation container.
          Set automatically when ecoli_sources_repo_url is provided, or manually via
          the CLI's --sources flag.
      - name: ecoli_sources_overlays
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Semicolon-separated overlay manifest URIs for ECOLI_SOURCES_OVERLAYS.
          title: Ecoli Sources Overlays
        description: Semicolon-separated overlay manifest URIs for ECOLI_SOURCES_OVERLAYS.
      - name: ecoli_sources_repo_url
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: GitHub repo URL for ecoli-sources data. The server downloads
            and syncs to S3 automatically, then injects ECOLI_SOURCES on the container.
            No AWS CLI needed on the client.
          title: Ecoli Sources Repo Url
        description: GitHub repo URL for ecoli-sources data. The server downloads
          and syncs to S3 automatically, then injects ECOLI_SOURCES on the container.
          No AWS CLI needed on the client.
      - name: ecoli_sources_ref
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Git ref (branch/tag/commit) for ecoli_sources_repo_url. Defaults
            to 'main'.
          title: Ecoli Sources Ref
        description: Git ref (branch/tag/commit) for ecoli_sources_repo_url. Defaults
          to 'main'.
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/AnalysisOptions'
              - type: 'null'
              title: Analysis Options
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Simulations
      summary: List all simulation specs uploaded to the database
      operationId: list-ecoli-simulations
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Simulation'
                title: Response List-Ecoli-Simulations
  /api/v1/simulations/{id}:
    get:
      tags:
      - Simulations
      summary: Get Simulation
      operationId: get-ecoli-simulation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the simulation
          title: Id
        description: Database ID of the simulation
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/Simulation'
                - type: 'null'
                title: Response Get-Ecoli-Simulation
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/status:
    get:
      tags:
      - Simulations
      summary: Get the simulation status record by its ID
      operationId: get-ecoli-simulation-status
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/cancel:
    delete:
      tags:
      - Simulations
      summary: Cancel a running simulation
      description: Cancel a running simulation by killing its backend job.
      operationId: cancel-ecoli-simulation
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the simulation
          title: Id
        description: Database ID of the simulation
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/log:
    get:
      tags:
      - Simulations
      summary: Get the structured output of a given simulation workflow log.
      operationId: get-ecoli-simulation-log
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      - name: truncate
        in: query
        required: false
        schema:
          type: boolean
          description: If true, return only the Nextflow header + final status block
            (separated by '... truncated ...'). Set to false for the full log.
          default: true
          title: Truncate
        description: If true, return only the Nextflow header + final status block
          (separated by '... truncated ...'). Set to false for the full log.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/analysis:
    post:
      tags:
      - Simulations
      summary: Run standalone analysis on existing simulation output
      operationId: run-ecoli-simulation-analysis
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of a completed simulation.
          title: Id
        description: Database ID of a completed simulation.
      - name: modules
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'JSON object mapping analysis domains to module configs. E.g.
            ''{"multiseed": {"ptools_rna": {"n_tp": 10}}}''. If omitted, runs default
            ptools modules.'
          title: Modules
        description: 'JSON object mapping analysis domains to module configs. E.g.
          ''{"multiseed": {"ptools_rna": {"n_tp": 10}}}''. If omitted, runs default
          ptools modules.'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Run-Ecoli-Simulation-Analysis
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/simulations/{id}/data:
    post:
      tags:
      - Simulations
      summary: Get simulation omics data as a downloadable tar.gz archive
      description: "Get simulation outputs as a tar.gz archive.\n\nChoose response_type\
        \ based on your use case:\n- **file**: Creates the archive and returns it\
        \ as a downloadable file.\n  Best for browser downloads and Swagger UI - shows\
        \ a \"Download\" button.\n- **streaming**: Streams the archive in chunks as\
        \ it's created.\n  Better for very large files or when you want to start processing\
        \ before download completes."
      operationId: get-ecoli-simulation-data
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the simulation.
          title: Id
        description: Database ID of the simulation.
      - name: response_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SimulationAnalysisDataResponseType'
          description: 'Response type: ''file'' for direct download (recommended for
            browsers/Swagger UI), ''streaming'' for chunked streaming response (better
            for large files or programmatic access)'
          default: file
        description: 'Response type: ''file'' for direct download (recommended for
          browsers/Swagger UI), ''streaming'' for chunked streaming response (better
          for large files or programmatic access)'
      responses:
        '200':
          description: A tar.gz archive containing simulation output files
          content:
            application/json:
              schema: {}
            application/gzip: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses:
    post:
      tags:
      - Analyses
      summary: Run an analysis
      operationId: run-ecoli-simulation-analysis
      parameters:
      - name: stream
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Set to 'heartbeat' to receive whitespace heartbeats on the
            response body while the SLURM job runs. Keeps the connection alive across
            ingress / SSH / ALB idle-timeouts. Response body is still a valid JSON
            document (leading whitespace is tolerated by standard JSON parsers). On
            failure the body is a JSON object (not an array); clients should branch
            on response shape.
          title: Stream
        description: Set to 'heartbeat' to receive whitespace heartbeats on the response
          body while the SLURM job runs. Keeps the connection alive across ingress
          / SSH / ALB idle-timeouts. Response body is still a valid JSON document
          (leading whitespace is tolerated by standard JSON parsers). On failure the
          body is a JSON object (not an array); clients should branch on response
          shape.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExperimentAnalysisRequest'
              default:
                experiment_id: sim3-baseline-ca00
                multiseed:
                - name: ptools_rna
                  n_tp: 8
                  variant: 0
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                  - $ref: '#/components/schemas/TsvOutputFile'
                  - $ref: '#/components/schemas/OutputFileMetadata'
                title: Response Run-Ecoli-Simulation-Analysis
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}:
    get:
      tags:
      - Analyses
      summary: Retrieve an experiment analysis spec from the database
      operationId: get-analysis
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentAnalysisDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}/status:
    get:
      tags:
      - Analyses
      summary: Get the status of an existing experiment analysis run
      operationId: get-analysis-status
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the analysis
          title: Id
        description: Database ID of the analysis
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}/log:
    get:
      tags:
      - Analyses
      summary: Get the log of an existing experiment analysis run
      operationId: get-analysis-log
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the analysis
          title: Id
        description: Database ID of the analysis
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                title: Response Get-Analysis-Log
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analyses/{id}/plots:
    get:
      tags:
      - Analyses
      summary: Get an array of HTML files representing all plot outputs of a given
        analysis.
      operationId: get-analysis-plots
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          description: Database ID of the analysis
          title: Id
        description: Database ID of the analysis
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OutputFile'
                title: Response Get-Analysis-Plots
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulator/latest:
    get:
      tags:
      - EcoliSim
      summary: Get the latest simulator version
      operationId: get-latest-simulator
      parameters:
      - name: git_repo_url
        in: query
        required: false
        schema:
          type: string
          default: https://github.com/CovertLabEcoli/vEcoli-private
          title: Git Repo Url
      - name: git_branch
        in: query
        required: false
        schema:
          type: string
          default: master
          title: Git Branch
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulator'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulator/versions:
    get:
      tags:
      - EcoliSim
      summary: get the list of available simulator versions
      operationId: get-simulator-versions
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisteredSimulators'
  /core/v1/simulator/status:
    get:
      tags:
      - EcoliSim
      summary: Get simulator container build status by its ID
      operationId: get-simulator-status
      parameters:
      - name: simulator_id
        in: query
        required: true
        schema:
          type: integer
          title: Simulator Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HpcRun'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulator/upload:
    post:
      tags:
      - EcoliSim
      summary: Upload a new simulator (vEcoli) version.
      operationId: insert-simulator-version
      parameters:
      - name: force
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Force
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Simulator'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulatorVersion'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulation/parca:
    post:
      tags:
      - EcoliSim
      summary: Run a parameter calculation
      operationId: run-parca
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParcaDatasetRequest'
              default:
                simulator_version:
                  git_commit_hash: 2f3ead
                  git_repo_url: https://github.com/CovertLabEcoli/vEcoli-private
                  git_branch: master
                  database_id: 25
                  created_at: '2026-06-01T12:11:36.655869'
                parca_config:
                  outdir: /projects/SMS/sms_api/prod/sims
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcaDataset'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /core/v1/simulation/parca/versions:
    get:
      tags:
      - EcoliSim
      summary: Get list of parca calculations
      operationId: get-parca-versions
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ParcaDataset'
                type: array
                title: Response Get-Parca-Versions
  /core/v1/simulation/parca/status:
    get:
      tags:
      - EcoliSim
      summary: Get parca calculation status by its ID
      operationId: get-parca-status
      parameters:
      - name: parca_id
        in: query
        required: true
