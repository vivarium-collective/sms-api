          - type: 'null'
          title: Job Id
      type: object
      required:
      - database_id
      - name
      - config
      - last_updated
      title: ExperimentAnalysisDTO
      description: "DTO returned by /analyses .. endpoints\n\nAttributes:\n    database_id:\
        \ (``int``) unique identifier of analysis record.\n    name: (``str``) analysis\
        \ name.\n    config: (``AnalysisConfig``) data model whose serialized format\n\
        \        represents a valid analysis config ingestible by vEcoli.\n    job_name:\
        \ (``str | None``) SLURM analysis job name referenced by sbatch directives.\n\
        \    job_id: (``int | None``) SLURM analysis job id generated by the ``sbatch``\
        \ evocation.\n        Defaults to ``None`` (such that this object can be partially\
        \ instantiated)."
    ExperimentAnalysisRequest:
      properties:
        experiment_id:
          type: string
          title: Experiment Id
        generation_start:
          anyOf:
          - type: integer
          - type: 'null'
          title: Generation Start
        generation_end:
          anyOf:
          - type: integer
          - type: 'null'
          title: Generation End
        seeds:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Seeds
        single:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Single
        multidaughter:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multidaughter
        multigeneration:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multigeneration
        multiseed:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multiseed
        multivariant:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multivariant
        multiexperiment:
          anyOf:
          - items:
              anyOf:
              - $ref: '#/components/schemas/AnalysisModuleConfig'
              - $ref: '#/components/schemas/PtoolsAnalysisConfig'
            type: array
          - type: 'null'
          title: Multiexperiment
      type: object
      required:
      - experiment_id
      title: ExperimentAnalysisRequest
      description: "Request body for the ``POST /analyses`` (ptools) endpoint.\n\n\
        Top-level ``generation_start``, ``generation_end``, and ``seeds`` are\nfully\
        \ supported for ``single`` analyses \u2014 they restrict which simulation\n\
        data rows are returned, with metadata identifying each partition.\n\nFor aggregated\
        \ types (``multigeneration``, ``multiseed``), the filters are\npassed to vEcoli\
        \ but not currently applied to the per-subset data query\n(known vEcoli limitation).\
        \  Use ``single`` with filters and aggregate\nclient-side as a workaround.\n\
        \nPer-module params (``n_tp``, ``time_unit``, \u2026) are set inside each\n\
        ``PtoolsAnalysisConfig`` entry and only affect the module they belong to."
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
