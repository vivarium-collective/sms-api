          - type: 'null'
          title: Extra Instructions
          description: Optional extra context for the wrapper agent
        process_type:
          type: string
          title: Process Type
          description: '''Process'' (time-stepped) or ''Step'' (event-driven/stateless)'
          default: Process
        input_ports:
          items:
            $ref: '#/components/schemas/PbgPortSchema'
          type: array
          title: Input Ports
          description: Input port definitions for the scaffold path (unused when use_agent=True)
        output_ports:
          items:
            $ref: '#/components/schemas/PbgPortSchema'
          type: array
          title: Output Ports
          description: Output port definitions for the scaffold path (unused when
            use_agent=True)
        config_params:
          items:
            $ref: '#/components/schemas/PbgConfigParam'
          type: array
          title: Config Params
          description: Config parameter definitions for the scaffold path (unused
            when use_agent=True)
        use_agent:
          type: boolean
          title: Use Agent
          description: When True (default), invoke the Claude API pbg-expert agent
            to generate the wrapper. When False (or when COMPOSE_PBG_ANTHROPIC_API_KEY
            is not configured), fall back to deterministic template-based scaffolding
            using the port/config definitions above.
