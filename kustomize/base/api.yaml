apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: batch-submit
      nodeSelector:
        vlan: internal
      securityContext:
        runAsUser: 17163
        runAsGroup: 10000
        fsGroup: 10000
      containers:
        - name: api
          image: ghcr.io/vivarium-collective/sms-api:0.2.74-dev  # KNOWN STABLE: 0.2.74-dev(vxrails prod), 0.2.30-dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-password
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-database
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-port
            - name: SLURM_SUBMIT_KEY_PATH
              value: "/run/secrets/slurm_submit_key_file/ssh-privatekey"
          # Reserve ephemeral-storage so the kubelet schedules us on a node
          # with enough disk for the per-request results cache below.  Without
          # this, large downloads (e.g. 10k-sim analyses) trigger eviction
          # under "The node was low on resource: ephemeral-storage".
          #
          # Sizing is derived from actual node allocatable, not wishful
          # thinking.  On the sms-api-stanford-test EKS node group (m6i.large,
          # default 20 GiB root EBS) each node reports ~16.9 GiB allocatable
          # ephemeral-storage.  We therefore:
          #   - request 4 GiB so we fit on either node without crowding out
          #     the other workloads on -44-192 that share the overlay fs,
          #   - limit to 12 GiB (~71% of node allocatable) so the kubelet
          #     can actually enforce the ceiling without cascading eviction
          #     of unrelated pods.
          # If sim 44's real cache size exceeds 12 GiB, the proper fix is
          # task 11 (stream S3 directly into tar response, zero cache) —
          # NOT cranking these numbers up past what the node can honor.
          resources:
            requests:
              ephemeral-storage: "4Gi"
            limits:
              ephemeral-storage: "12Gi"
          volumeMounts:
            - name: vivarium-home-pvc
              mountPath: /home/FCAM/svc_vivarium
              subPath: svc_vivarium
            - name: slurm-submit-key-file
              mountPath: /run/secrets/slurm_submit_key_file
            - name: ssh-known-hosts
              mountPath: /run/secrets/ssh-known-hosts
              readOnly: true
            # Dedicated results cache so /app/.results_cache does NOT live on
            # the container's overlay filesystem.  The emptyDir is subject to
            # the pod's ephemeral-storage limit above, but it gives us a clean
            # accounting boundary and lets us size downloads deterministically.
            - name: results-cache
              mountPath: /app/.results_cache
      volumes:
        - name: vivarium-home-pvc
          persistentVolumeClaim:
            claimName: vivarium-home-pvc
        - name: slurm-submit-key-file
          secret:
            defaultMode: 256 # 0400
            items:
              - key: ssh-privatekey
                path: ssh-privatekey
            secretName: ssh-secret
        - name: ssh-known-hosts
          configMap:
            name: ssh-known-hosts
        - name: results-cache
          emptyDir:
            # Match the container's ephemeral-storage limit above so the
            # kubelet enforces them consistently.  Must stay <= node
            # allocatable (~16.9 GiB on m6i.large w/ 20 GiB root EBS).
            sizeLimit: 12Gi
      imagePullSecrets:
        - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: api
  name: api
spec:
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    app: api
