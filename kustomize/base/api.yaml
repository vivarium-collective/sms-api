apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: batch-submit
      nodeSelector:
        vlan: internal
      securityContext:
        runAsUser: 17163
        runAsGroup: 10000
        fsGroup: 10000
      containers:
        - name: api
          image: ghcr.io/vivarium-collective/sms-api:0.2.74-dev  # KNOWN STABLE: 0.2.74-dev(vxrails prod), 0.2.30-dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-password
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-database
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: postgres-port
            - name: SLURM_SUBMIT_KEY_PATH
              value: "/run/secrets/slurm_submit_key_file/ssh-privatekey"
          # Reserve ephemeral-storage so the kubelet schedules us on a node
          # with enough disk for the per-request results cache below.  Without
          # this, large downloads (e.g. 10k-sim analyses) trigger eviction
          # under "The node was low on resource: ephemeral-storage".
          resources:
            requests:
              ephemeral-storage: "8Gi"
            limits:
              ephemeral-storage: "60Gi"
          volumeMounts:
            - name: vivarium-home-pvc
              mountPath: /home/FCAM/svc_vivarium
              subPath: svc_vivarium
            - name: slurm-submit-key-file
              mountPath: /run/secrets/slurm_submit_key_file
            - name: ssh-known-hosts
              mountPath: /run/secrets/ssh-known-hosts
              readOnly: true
            # Dedicated results cache so /app/.results_cache does NOT live on
            # the container's overlay filesystem.  The emptyDir is subject to
            # the pod's ephemeral-storage limit above, but it gives us a clean
            # accounting boundary and lets us size downloads deterministically.
            - name: results-cache
              mountPath: /app/.results_cache
      volumes:
        - name: vivarium-home-pvc
          persistentVolumeClaim:
            claimName: vivarium-home-pvc
        - name: slurm-submit-key-file
          secret:
            defaultMode: 256 # 0400
            items:
              - key: ssh-privatekey
                path: ssh-privatekey
            secretName: ssh-secret
        - name: ssh-known-hosts
          configMap:
            name: ssh-known-hosts
        - name: results-cache
          emptyDir:
            sizeLimit: 50Gi
      imagePullSecrets:
        - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: api
  name: api
spec:
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    app: api
