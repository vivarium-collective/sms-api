apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# STABLE SRI WORKING VERSION:
# - name: ghcr.io/vivarium-collective/sms-api
#   (old)newTag: 0.2.74-dev
#   newTag: 0.4.14

namespace: sms-api-rke

images:
  - name: ghcr.io/vivarium-collective/sms-api
    newTag: 0.7.3
  # ptools pinned to last-known-good tag — see Stanford-test kustomization
  # for rationale.  No sms-ptools:0.6.x image exists on ghcr.io because the
  # build-and-push GH Action's ptools step is broken.
  - name: ghcr.io/vivarium-collective/sms-ptools
    newTag: 0.5.9

replicas:
  - count: 1
    name: api
  - count: 1
    name: ptools
  - count: 1
    name: redis

resources:
  - ingress.yaml
  - redis-svc.yaml
  - haproxy-ssh-svc.yaml
  - vivarium-home-pv.yaml
  - vivarium-home-pvc.yaml
  - secret-ghcr.yaml
  - secret-shared.yaml
  - secret-ssh.yaml
  - ../../config/sms-api-rke
  - ../../base
