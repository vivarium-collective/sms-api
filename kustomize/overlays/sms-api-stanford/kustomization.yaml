apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sms-api-stanford

# cd1 release version of api (as given to PNNL):
# - name: ghcr.io/vivarium-collective/sms-api
#   newTag: 0.4.5

images:
  - name: ghcr.io/vivarium-collective/sms-api
    newTag: 0.9.23
  # ptools pinned to last-known-good tag — CI only builds sms-api, so there is
  # no newer sms-ptools:0.6.x image on ghcr.io.  0.5.9 is the tag the live Stanford
  # pod has been running successfully; keeping both namespaces pointing here
  # avoids an ErrImagePull ReplicaSet while api iterates independently.
  - name: ghcr.io/vivarium-collective/sms-ptools
    newTag: 0.5.9
  # vivarium-workbench: pin the workbench GitHub Release tag (build-and-push.yml ->
  # ghcr:<version>). 0.3.0 = 0.2.0 demo-migration image + pinned-run progress bar
  # (#467) and report-rendering fixes (#468/#470). 0.3.1 adds the bigraph-loom
  # base-path fix (workbench #476): the wiring explorer's "test run" posted a
  # root-absolute /api/composite-test-run, which escaped the /workbench prefix and
  # matched the ALB's /api/* rule -> routed to sms-api, 404. (matches stanford-test).
  - name: ghcr.io/vivarium-collective/vivarium-workbench
    newTag: 0.3.1

replicas:
  - count: 1
    name: api
  - count: 1
    name: ptools
  # Single writer: workbench holds a git working copy + SQLite on an RWO EBS volume.
  # Pinned here explicitly (not just inherited from base/workbench.yaml) so the count
  # lives alongside every other deployment's.
  - count: 1
    name: workbench
  - count: 0
    name: redis
  - count: 0
    name: haproxy-ssh

resources:
#  - ingress.yaml
  - target-group-binding.yaml
  - secret-ghcr.yaml
  - secret-shared.yaml
  # vivarium-workbench: peer Deployment+Service (base/workbench referenced directly,
  # NOT via base/kustomization.yaml, so it deploys ONLY on Stanford) + its EBS PVC.
  # Its TargetGroupBinding (workbench-binding) is in target-group-binding.yaml above.
  - ../../base/workbench
  - workbench-pvc.yaml
  - ../../config/sms-api-stanford
  - ../../base

patches:
  - patch: |-
      - op: add
        path: /metadata/annotations/eks.amazonaws.com~1role-arn
        value: arn:aws-us-gov:iam::476270107793:role/smscdk-batch-BatchSubmitIrsaRole31BE49CD-vYkQKg5TNDXz
    target:
      kind: ServiceAccount
      name: batch-submit
  - patch: |-
      - op: remove
        path: /spec/template/spec/nodeSelector
    target:
      kind: Deployment
      name: api
  # Remove SLURM/SSH infrastructure from base api.yaml — stanford uses
  # K8s/AWS Batch exclusively.  Order: highest index first so removals don't
  # shift the indices of subsequent operations.
  - patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/env/5
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/2
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/0
      - op: remove
        path: /spec/template/spec/volumes/2
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: remove
        path: /spec/template/spec/volumes/0
    target:
      kind: Deployment
      name: api
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: ghcr-secret
          mountPath: /run/secrets/ghcr
          readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: ghcr-secret
          secret:
            secretName: ghcr-secret
            defaultMode: 256
    target:
      kind: Deployment
      name: api
  # Browser-reachable PTools base for the pbg-ptools Omics Viewer. The seed
  # initContainer stamps this into the served workspace.yaml (ui.ptools_server_url).
  # Tunnel value (sms-proxy -s smscdk -> localhost:8080, PTools at the ALB root).
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: workbench
      spec:
        template:
          spec:
            initContainers:
              - name: seed-workspace
                env:
                  - name: PTOOLS_SERVER_URL
                    value: "http://localhost:8080"
                  # Omics Viewer DATA overlay: the in-cluster ptools pod fetches
                  # the study TSV from this workbench Service URL (same namespace,
                  # incl. the /workbench base path the container serves under).
                  # The seed also clears ui.ptools_data_dir so HTTP delivery is used.
                  - name: DASHBOARD_PUBLIC_BASE_URL
                    value: "http://workbench.sms-api-stanford.svc.cluster.local:8000/workbench"
    target:
      kind: Deployment
      name: workbench
