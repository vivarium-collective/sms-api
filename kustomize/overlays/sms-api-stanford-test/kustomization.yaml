apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sms-api-stanford-test

# STABLE: 0.5.9 | 0.6.2

images:
  - name: ghcr.io/vivarium-collective/sms-api
    newTag: 0.9.17
  # ptools pinned to last-known-good tag — CI only builds sms-api, so there is
  # no newer sms-ptools:0.6.x image on ghcr.io.  0.5.9 is the tag the live Stanford
  # pod has been running successfully; keeping both namespaces pointing here
  # avoids an ErrImagePull ReplicaSet while api iterates independently.
  - name: ghcr.io/vivarium-collective/sms-ptools
    newTag: 0.5.9
  # vivarium-workbench: published by cutting a GitHub Release in the workbench
  # repo (build-and-push.yml → ghcr:<version>); pin that release tag here.
  # 0.1.1 = first image with the pbg-ptools viewer plugin + decoupled v2ecoli.
  # 72e00b8 = demo-v2ecoli dev SHA: adds pinned-build remote runs (Segment 6
  # Part B) on top of bigraph-loom (Bug 3) + CSRF allowed-origins (Bug 2).
  # Revert to a release tag after WS-F merge.
  - name: ghcr.io/vivarium-collective/vivarium-workbench
    newTag: 72e00b8

replicas:
  - count: 1
    name: api
  - count: 1
    name: ptools
  - count: 0
    name: redis
  - count: 0
    name: haproxy-ssh

resources:
#  - ingress.yaml
  - target-group-binding.yaml # to accept traffic from predefined ALB rather than use an ingres
  - secret-ghcr.yaml
  - secret-shared.yaml
  # vivarium-workbench: peer Deployment+Service (base/workbench.yaml is referenced
  # directly, NOT via base/kustomization.yaml, so it deploys ONLY on Stanford) +
  # its EBS PVC. Its TargetGroupBinding is in target-group-binding.yaml above.
  - ../../base/workbench
  - workbench-pvc.yaml
  - ../../config/sms-api-stanford-test
  - ../../base

patches:
  - patch: |-
      - op: add
        path: /metadata/annotations/eks.amazonaws.com~1role-arn
        value: arn:aws-us-gov:iam::476270107793:role/smsvpctest-batch-BatchSubmitIrsaRole31BE49CD-xETZl8o1n6cE
    target:
      kind: ServiceAccount
      name: batch-submit
  - patch: |-
      - op: remove
        path: /spec/template/spec/nodeSelector
    target:
      kind: Deployment
      name: api
  # Remove SLURM/SSH infrastructure from base api.yaml — stanford-test uses
  # K8s/AWS Batch exclusively.  Order: highest index first so removals don't
  # shift the indices of subsequent operations.
  - patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/env/5
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/2
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/0
      - op: remove
        path: /spec/template/spec/volumes/2
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: remove
        path: /spec/template/spec/volumes/0
    target:
      kind: Deployment
      name: api
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: ghcr-secret
          mountPath: /run/secrets/ghcr
          readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: ghcr-secret
          secret:
            secretName: ghcr-secret
            defaultMode: 256
    target:
      kind: Deployment
      name: api
  # Browser-reachable PTools base for the pbg-ptools Omics Viewer. The seed
  # initContainer stamps this into the served workspace.yaml (ui.ptools_server_url),
  # overriding the baked-in local-dev http://localhost:1555. Tunnel value
  # (sms-proxy -s smsvpctest -> localhost:8080, PTools at the ALB root); use a real
  # internal-ALB DNS if the demo is hosted for others.
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: workbench
      spec:
        template:
          spec:
            initContainers:
              - name: seed-workspace
                env:
                  - name: PTOOLS_SERVER_URL
                    value: "http://localhost:8080"
                  # Omics Viewer DATA overlay: the in-cluster ptools pod fetches
                  # the study TSV from this workbench Service URL (same namespace,
                  # incl. the /workbench base path the container serves under).
                  # The seed also clears ui.ptools_data_dir so HTTP delivery is
                  # used (ptools has no workspace mount).
                  - name: DASHBOARD_PUBLIC_BASE_URL
                    value: "http://workbench.sms-api-stanford-test.svc.cluster.local:8000/workbench"
    target:
      kind: Deployment
      name: workbench
