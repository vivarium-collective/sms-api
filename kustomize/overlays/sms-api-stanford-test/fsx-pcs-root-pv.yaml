apiVersion: v1
kind: PersistentVolume
metadata:
  name: fsx-pcs-root-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fsx-sc-static
  csi:
    driver: fsx.csi.aws.com
    volumeHandle: fs-0ddd1b73696c88165
    volumeAttributes:
      # Use IP address instead of DNS name - Lustre client requires IP for NID
      dnsname: 10.99.41.24
      mountname: xqrs5bev
