name: ptools API Verification

on:
  workflow_dispatch:

jobs:
  verify:
    name: Run ptools analyses endpoint verification
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://sms.cam.uchc.edu
      EXP_A: sim3-test-677a
      EXP_B: sim3-test-45c5

    steps:
      - name: Generate randomized n_tp values
        id: params
        run: |
          # Valid range: 5–20. Use $RANDOM (0–32767) mod 16 + 5.
          NTP1=$(( (RANDOM % 16) + 5 ))
          NTP2=$(( (RANDOM % 16) + 5 ))
          NTP3=$(( (RANDOM % 16) + 5 ))
          NTP4=$(( (RANDOM % 16) + 5 ))
          # Ensure each pair is distinct to avoid accidental cache hits between runs
          [ "$NTP2" -eq "$NTP3" ] && NTP3=$(( NTP3 % 16 + 5 ))
          echo "ntp1=$NTP1" >> "$GITHUB_OUTPUT"
          echo "ntp2=$NTP2" >> "$GITHUB_OUTPUT"
          echo "ntp3=$NTP3" >> "$GITHUB_OUTPUT"
          echo "ntp4=$NTP4" >> "$GITHUB_OUTPUT"
          echo "Generated n_tp values: req1=$NTP1  req2-rna=$NTP2 req2-rxns=$NTP3  req3=$NTP3  req4=$NTP4"

      # ── Request 1: single module, no filters (sim3-test-677a) ─────────────
      - name: "Request 1 — ptools_rna, no filters (${{ env.EXP_A }})"
        id: req1
        run: |
          NTP=${{ steps.params.outputs.ntp1 }}
          echo "▸ POST $BASE_URL/api/v1/analyses"
          echo "  experiment_id=$EXP_A  module=ptools_rna  n_tp=$NTP"

          BODY=$(jq -n \
            --arg eid "$EXP_A" \
            --argjson ntp "$NTP" \
            '{"experiment_id":$eid,"single":[{"name":"ptools_rna","n_tp":$ntp,"variant":0}]}')

          START=$(date +%s%3N)
          RESPONSE=$(curl -sf -w '\n__STATUS__%{http_code}__TIME__%{time_total}s' \
            -X POST "$BASE_URL/api/v1/analyses" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          END=$(date +%s%3N)
          WALL=$(( END - START ))ms

          STATUS=$(echo "$RESPONSE" | grep -oP '(?<=__STATUS__)\d+')
          TIMING=$(echo "$RESPONSE" | grep -oP '__TIME__\K[^ ]+')
          BODY_OUT=$(echo "$RESPONSE" | sed '/__STATUS__/d')

          echo "  status=$STATUS  time=$TIMING  wall=${WALL}"
          echo "$BODY_OUT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  items={len(d)}')
          for item in d[:2]:
              lines = item.get('content','').split('\n')
              print(f'  file={item[\"filename\"]}  seed={item.get(\"lineage_seed\")}  gen={item.get(\"generation\")}')
              print(f'  header: {lines[0][:100]}')
              for l in lines[1:4]: print(f'  {l[:80]}')
          " || true

          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "  ✓ PASS"

      # ── Request 2: two modules (sim3-test-45c5) ───────────────────────────
      - name: "Request 2 — ptools_rna + ptools_rxns (${{ env.EXP_B }})"
        id: req2
        run: |
          NTP_RNA=${{ steps.params.outputs.ntp2 }}
          NTP_RXN=${{ steps.params.outputs.ntp3 }}
          echo "▸ POST $BASE_URL/api/v1/analyses"
          echo "  experiment_id=$EXP_B  ptools_rna n_tp=$NTP_RNA  ptools_rxns n_tp=$NTP_RXN"

          BODY=$(jq -n \
            --arg eid "$EXP_B" \
            --argjson ntp_rna "$NTP_RNA" \
            --argjson ntp_rxn "$NTP_RXN" \
            '{"experiment_id":$eid,"single":[{"name":"ptools_rna","n_tp":$ntp_rna,"variant":0},{"name":"ptools_rxns","n_tp":$ntp_rxn,"variant":0}]}')

          START=$(date +%s%3N)
          RESPONSE=$(curl -sf -w '\n__STATUS__%{http_code}__TIME__%{time_total}s' \
            -X POST "$BASE_URL/api/v1/analyses" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          END=$(date +%s%3N)
          WALL=$(( END - START ))ms

          STATUS=$(echo "$RESPONSE" | grep -oP '(?<=__STATUS__)\d+')
          TIMING=$(echo "$RESPONSE" | grep -oP '__TIME__\K[^ ]+')
          BODY_OUT=$(echo "$RESPONSE" | sed '/__STATUS__/d')

          echo "  status=$STATUS  time=$TIMING  wall=${WALL}"
          echo "$BODY_OUT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  items={len(d)}')
          for item in d:
              lines = item.get('content','').split('\n')
              print(f'  file={item[\"filename\"]}  seed={item.get(\"lineage_seed\")}  gen={item.get(\"generation\")}')
              print(f'  header: {lines[0][:100]}')
              for l in lines[1:3]: print(f'  {l[:80]}')
          " || true

          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          ITEMS=$(echo "$BODY_OUT" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          [ "$ITEMS" -eq 2 ] || { echo "FAIL: expected 2 result items, got $ITEMS"; exit 1; }
          echo "  ✓ PASS"

      # ── Request 3: generation filter (sim3-test-677a) ─────────────────────
      - name: "Request 3 — ptools_rna, generation_start/end filter (${{ env.EXP_A }})"
        id: req3
        run: |
          NTP=${{ steps.params.outputs.ntp3 }}
          echo "▸ POST $BASE_URL/api/v1/analyses"
          echo "  experiment_id=$EXP_A  generation_start=1  generation_end=1  n_tp=$NTP"

          BODY=$(jq -n \
            --arg eid "$EXP_A" \
            --argjson ntp "$NTP" \
            '{"experiment_id":$eid,"generation_start":1,"generation_end":1,"single":[{"name":"ptools_rna","n_tp":$ntp,"variant":0}]}')

          START=$(date +%s%3N)
          RESPONSE=$(curl -sf -w '\n__STATUS__%{http_code}__TIME__%{time_total}s' \
            -X POST "$BASE_URL/api/v1/analyses" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          END=$(date +%s%3N)
          WALL=$(( END - START ))ms

          STATUS=$(echo "$RESPONSE" | grep -oP '(?<=__STATUS__)\d+')
          TIMING=$(echo "$RESPONSE" | grep -oP '__TIME__\K[^ ]+')
          BODY_OUT=$(echo "$RESPONSE" | sed '/__STATUS__/d')

          echo "  status=$STATUS  time=$TIMING  wall=${WALL}"
          echo "$BODY_OUT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  items={len(d)}')
          for item in d[:2]:
              lines = item.get('content','').split('\n')
              print(f'  file={item[\"filename\"]}  seed={item.get(\"lineage_seed\")}  gen={item.get(\"generation\")}')
              print(f'  header: {lines[0][:100]}')
              for l in lines[1:3]: print(f'  {l[:80]}')
          " || true

          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          echo "  ✓ PASS"

      # ── Request 4: seed filter (sim3-test-45c5) ───────────────────────────
      - name: "Request 4 — ptools_rna, seeds=[0] filter (${{ env.EXP_B }})"
        id: req4
        run: |
          NTP=${{ steps.params.outputs.ntp4 }}
          echo "▸ POST $BASE_URL/api/v1/analyses"
          echo "  experiment_id=$EXP_B  seeds=[0]  n_tp=$NTP"

          BODY=$(jq -n \
            --arg eid "$EXP_B" \
            --argjson ntp "$NTP" \
            '{"experiment_id":$eid,"seeds":[0],"single":[{"name":"ptools_rna","n_tp":$ntp,"variant":0}]}')

          START=$(date +%s%3N)
          RESPONSE=$(curl -sf -w '\n__STATUS__%{http_code}__TIME__%{time_total}s' \
            -X POST "$BASE_URL/api/v1/analyses" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          END=$(date +%s%3N)
          WALL=$(( END - START ))ms

          STATUS=$(echo "$RESPONSE" | grep -oP '(?<=__STATUS__)\d+')
          TIMING=$(echo "$RESPONSE" | grep -oP '__TIME__\K[^ ]+')
          BODY_OUT=$(echo "$RESPONSE" | sed '/__STATUS__/d')

          echo "  status=$STATUS  time=$TIMING  wall=${WALL}"
          echo "$BODY_OUT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  items={len(d)}')
          for item in d[:2]:
              lines = item.get('content','').split('\n')
              print(f'  file={item[\"filename\"]}  seed={item.get(\"lineage_seed\")}  gen={item.get(\"generation\")}')
              print(f'  header: {lines[0][:100]}')
              for l in lines[1:3]: print(f'  {l[:80]}')
          " || true

          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }
          SEED=$(echo "$BODY_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('lineage_seed','?'))" 2>/dev/null || echo "?")
          [ "$SEED" = "0" ] || { echo "FAIL: expected lineage_seed=0 in result, got $SEED"; exit 1; }
          echo "  ✓ PASS"

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  ptools verification results"
          echo "  n_tp values used this run:"
          echo "    req1 = ${{ steps.params.outputs.ntp1 }}"
          echo "    req2 = rna=${{ steps.params.outputs.ntp2 }} rxns=${{ steps.params.outputs.ntp3 }}"
          echo "    req3 = ${{ steps.params.outputs.ntp3 }}"
          echo "    req4 = ${{ steps.params.outputs.ntp4 }}"
          echo "══════════════════════════════════════════════════════════"
